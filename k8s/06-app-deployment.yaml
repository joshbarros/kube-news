apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-news-api
  namespace: kube-news
  labels:
    app: kube-news-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kube-news-api
  template:
    metadata:
      labels:
        app: kube-news-api
    spec:
      containers:
        - name: kube-news-api
          image: goldenglowitsolutions/kube-news-api:2.0.0
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: API_PORT
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: kube-news-config
                  key: CORS_ORIGIN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kube-news-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
